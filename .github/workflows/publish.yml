name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Gate, build and publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(poetry version -s)"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PYPROJECT_VERSION. Bump the version before tagging."
            exit 1
          fi

      - name: Verify CHANGELOG has a section for this version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## \[$TAG_VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG_VERSION]' section. Write the changelog before tagging."
            exit 1
          fi

      - name: Install system libraries (PyGObject tray extra, Qt runtime, xvfb)
        run: sudo apt-get update && sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config libegl1 libgl1 libxkbcommon-x11-0 xvfb

      - name: Install dependencies
        run: poetry install --with dev --all-extras

      - name: Run full check chain (lint + format + types + tests)
        run: xvfb-run -a make ci

      - name: Build distributions
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent: a tag whose version was already uploaded (e.g. via the
          # local `make publish` path) does not fail the workflow.
          skip-existing: true
