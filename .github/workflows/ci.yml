name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install GObject system libraries (for the PyGObject tray extra)
        run: sudo apt-get update && sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config

      - name: Install xvfb + scrot (real-window GUI tests + screenshots)
        run: sudo apt-get install -y xvfb scrot

      - name: Install dependencies
        run: poetry install --with dev --all-extras

      - name: Lint with ruff
        run: poetry run ruff check src/ tests/

      - name: Check formatting with ruff
        run: poetry run ruff format --check src/ tests/

      - name: Type check with mypy
        run: poetry run mypy src/ tests/

      - name: Run tests with coverage (GUI tests under xvfb)
        run: xvfb-run -a poetry run pytest --cov=docker_app_launcher --cov-report=xml
        env:
          DAL_SCREENSHOTS: "1"

      - name: Upload GUI screenshots
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: gui-screenshots
          path: test-screenshots/
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
